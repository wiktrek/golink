<!doctype html>
<html lang="en" data-theme="light">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Sign in — Golink</title>
  <script src="/static/theme.js?v=3"></script>
  <link rel="stylesheet" href="/static/style.css?v=3">
</head>
<body>
  <main>
    <p class="eyebrow">GOLINK</p>
    <h1>Sign in</h1>
    <p class="intro">Welcome back. Sign in to manage your links.</p>
    <form id="sign-in-form">
      <label>Username <input name="username" minlength="3" maxlength="96" required autofocus></label>
      <label>Password <input name="password" type="password" required></label>
      <button type="submit">Sign in</button>
    </form>
    <p id="error" class="error" role="alert" hidden></p>
    <p class="account">No account yet? <a href="/signup">Create one</a>.</p>
  </main>
  <script>
    const form = document.querySelector('#sign-in-form'), error = document.querySelector('#error');
    form.addEventListener('submit', async (event) => {
      event.preventDefault(); error.hidden = true;
      try {
        const response = await fetch('/api/sessions', { method: 'POST', headers: {'Content-Type': 'application/json'}, body: JSON.stringify(Object.fromEntries(new FormData(form))) });
        const data = await response.json();
        if (!response.ok) throw new Error(data.error || 'Could not sign in');
        window.location.href = '/dashboard';
      } catch (err) { error.textContent = err.message; error.hidden = false; }
    });
  </script>
</body>
</html>
